<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALPHA AVOCAT – Clientes</title>
  <style>
    body{font-family:Arial;margin:0;background:#f4f6f8;color:#0c1b2a}
    header{background:#0c1b2a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    a{color:#fff;text-decoration:none;margin-left:12px}
    main{max-width:1000px;margin:0 auto;padding:18px}
    .card{background:#fff;border:1px solid #e7eaee;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    label{display:block;margin-top:10px;font-size:13px;color:#5b6672}
    input,select{width:100%;padding:10px;border:1px solid #e7eaee;border-radius:10px;margin-top:6px;font-size:14px}
    button{background:#0c1b2a;color:#fff;border:none;padding:10px 12px;border-radius:10px;cursor:pointer;margin-top:12px}
    .row{border-top:1px solid #e7eaee;padding:12px 0}
    .row:first-child{border-top:none}
    .muted{color:#5b6672}
    .grid{display:grid;grid-template-columns: 1fr 1fr;gap:14px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div><b>ALPHA AVOCAT</b> <span class="muted" style="color:#cdd7e0">Clientes</span></div>
    <div>
      <a href="/panel.html">Panel</a>
      <a href="/causas.html">Causas</a>
      <a href="/agenda.html">Agenda</a>
      <a href="/login.html" id="logoutLink">Salir</a>
    </div>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <h2>Crear cliente</h2>

        <label>Nombre completo / Razón social</label>
        <input id="full_name" />

        <label>RUT</label>
        <input id="rut" />

        <label>Domicilio</label>
        <input id="address" />

        <label>Teléfono</label>
        <input id="phone" />

        <label>Email</label>
        <input id="email" type="email" />

        <label>Tipo</label>
        <select id="is_legal_entity">
          <option value="false">Persona natural</option>
          <option value="true">Persona jurídica</option>
        </select>

        <button id="btnCreate">Guardar</button>
        <p id="msg" class="muted"></p>
      </div>

      <div class="card">
        <h2>Clientes</h2>
        <div id="list"><span class="muted">Cargando…</span></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { supabase } from "./app.js";

    const { data: sessData } = await supabase.auth.getSession();
    if (!sessData.session) window.location.href = "/login.html";

    document.getElementById("logoutLink").addEventListener("click", async (e) => {
      e.preventDefault();
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });

    const msg = document.getElementById("msg");
    const list = document.getElementById("list");

    async function loadList(){
      const { data, error } = await supabase
        .from("clients")
        .select("id,full_name,rut,is_legal_entity,phone,email")
        .order("created_at",{ascending:false})
        .limit(50);

      if(error){ list.innerHTML = `<div class="muted">Error: ${error.message}</div>`; return; }
      if(!data || data.length===0){ list.innerHTML = `<div class="muted">Sin clientes aún.</div>`; return; }

      list.innerHTML = data.map(c => `
        <div class="row">
          <div><b>${esc(c.full_name)}</b> <span class="muted">${c.is_legal_entity ? "(PJ)" : "(PN)"}</span></div>
          <div class="muted">${c.rut ? esc(c.rut)+" • " : ""}${c.phone ? esc(c.phone)+" • " : ""}${c.email ? esc(c.email) : ""}</div>
        </div>
      `).join("");
    }

    document.getElementById("btnCreate").addEventListener("click", async () => {
      msg.textContent = "";

      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        rut: document.getElementById("rut").value.trim() || null,
        address: document.getElementById("address").value.trim() || null,
        phone: document.getElementById("phone").value.trim() || null,
        email: document.getElementById("email").value.trim() || null,
        is_legal_entity: document.getElementById("is_legal_entity").value === "true"
      };

      if(!payload.full_name){ msg.textContent="Falta nombre."; return; }

      const { error } = await supabase.from("clients").insert(payload);
      if(error){ msg.textContent="Error: "+error.message; return; }

      msg.textContent="Cliente guardado ✅";
      document.getElementById("full_name").value="";
      document.getElementById("rut").value="";
      document.getElementById("address").value="";
      document.getElementById("phone").value="";
      document.getElementById("email").value="";
      await loadList();
    });

    function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}

    loadList();
  </script>
</body>
</html>
