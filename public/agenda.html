<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALPHA AVOCAT – Agenda</title>
  <style>
    body{font-family:Arial;margin:0;background:#f4f6f8;color:#0c1b2a}
    header{background:#0c1b2a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    a{color:#fff;text-decoration:none;margin-left:12px}
    main{max-width:1000px;margin:0 auto;padding:18px}
    .card{background:#fff;border:1px solid #e7eaee;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    label{display:block;margin-top:10px;font-size:13px;color:#5b6672}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e7eaee;border-radius:10px;margin-top:6px;font-size:14px}
    textarea{min-height:90px}
    button{background:#0c1b2a;color:#fff;border:none;padding:10px 12px;border-radius:10px;cursor:pointer;margin-top:12px}
    .row{border-top:1px solid #e7eaee;padding:12px 0}
    .row:first-child{border-top:none}
    .muted{color:#5b6672}
    .grid{display:grid;grid-template-columns: 1fr 1fr;gap:14px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div>
      <b>ALPHA AVOCAT</b> <span class="muted" style="color:#cdd7e0">Agenda</span>
    </div>
    <div>
      <a href="/panel.html">Panel</a>
      <a href="/index.html">Portada</a>
      <a href="/login.html" id="logoutLink">Salir</a>
    </div>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <h2>Crear evento</h2>

        <label>Título</label>
        <input id="title" placeholder="Ej: Consulta jurídica / Audiencia / Reunión receptor" />

        <label>Tipo</label>
        <select id="kind">
          <option value="reunion">Reunión (cliente)</option>
          <option value="consulta_pagada">Consulta pagada (no cliente)</option>
          <option value="consulta_cortesia">Consulta cortesía</option>
          <option value="profesional">Profesional (abogado/receptor/perito)</option>
          <option value="audiencia">Audiencia judicial</option>
          <option value="alegato">Alegato</option>
          <option value="tramite">Trámite / Gestión</option>
        </select>

        <label>Inicio (fecha y hora)</label>
        <input id="starts_at" type="datetime-local" />

        <label>Fin (opcional)</label>
        <input id="ends_at" type="datetime-local" />

        <label>Persona (nombre)</label>
        <input id="person_name" placeholder="Nombre" />

        <label>Tipo de persona</label>
        <select id="person_type">
          <option value="cliente">Cliente</option>
          <option value="no_cliente">No cliente</option>
          <option value="profesional">Profesional</option>
        </select>

        <label>Reseña previa (preparación)</label>
        <textarea id="pre_brief" placeholder="Qué se tratará, antecedentes previos, documentos a traer…"></textarea>

        <label>Videoconferencia</label>
        <select id="vc_platform">
          <option value="">Sin videoconferencia</option>
          <option value="zoom">Zoom</option>
          <option value="meet">Google Meet</option>
          <option value="teams">Microsoft Teams</option>
          <option value="pjud">PJud / Tribunal</option>
          <option value="otro">Otro</option>
        </select>

        <label>Link videoconferencia (opcional)</label>
        <input id="vc_link" placeholder="https://…" />

        <label>Guardar reunión (espacio)</label>
        <select id="record_mode">
          <option value="no">No guardar</option>
          <option value="audio">Guardar solo audio</option>
          <option value="audio_video">Guardar audio + video (MP4)</option>
        </select>

        <button id="btnCreate">Crear</button>
        <p id="msg" class="muted"></p>
      </div>

      <div class="card">
        <h2>Próximos eventos</h2>
        <p class="muted">Se muestran los próximos 30.</p>
        <div id="list"><span class="muted">Cargando…</span></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { supabase } from "./app.js";

    // 1) exigir sesión
    const { data: sessData } = await supabase.auth.getSession();
    if (!sessData.session) window.location.href = "/login.html";

    // 2) logout
    document.getElementById("logoutLink").addEventListener("click", async (e) => {
      e.preventDefault();
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });

    const msg = document.getElementById("msg");
    const list = document.getElementById("list");

    function toISOFromLocal(dtLocal) {
      if (!dtLocal) return null;
      const d = new Date(dtLocal);
      return d.toISOString();
    }

    async function loadList() {
      list.innerHTML = `<span class="muted">Cargando…</span>`;
      const now = new Date().toISOString();

      const { data, error } = await supabase
        .from("appointments")
        .select("id,title,kind,starts_at,person_name,vc_link,record_mode")
        .gte("starts_at", now)
        .order("starts_at", { ascending: true })
        .limit(30);

      if (error) {
        list.innerHTML = `<div class="muted">No se pudo cargar la agenda.</div>`;
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = `<div class="muted">No hay eventos próximos.</div>`;
        return;
      }

      list.innerHTML = data.map(r => `
        <div class="row">
          <div><b>${escapeHtml(r.title || "(sin título)")}</b> <span class="muted">(${escapeHtml(r.kind)})</span></div>
          <div class="muted">${fmt(r.starts_at)}${r.person_name ? " • " + escapeHtml(r.person_name) : ""}</div>
          <div class="muted">${r.vc_link ? `🔗 <a href="${escapeAttr(r.vc_link)}" target="_blank" rel="noreferrer">Videoconferencia</a>` : ""} ${r.record_mode && r.record_mode !== "no" ? " • 🎙️/🎥 se guardará" : ""}</div>
        </div>
      `).join("");
    }

    function fmt(iso) {
      const d = new Date(iso);
      return d.toLocaleString("es-CL", { dateStyle:"medium", timeStyle:"short" });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }
    function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }

    document.getElementById("btnCreate").addEventListener("click", async () => {
      msg.textContent = "";

      const title = document.getElementById("title").value.trim();
      const kind = document.getElementById("kind").value;
      const starts_at = toISOFromLocal(document.getElementById("starts_at").value);
      const ends_at = toISOFromLocal(document.getElementById("ends_at").value);

      if (!title) { msg.textContent = "Falta título."; return; }
      if (!starts_at) { msg.textContent = "Falta fecha/hora de inicio."; return; }

      const payload = {
        title,
        kind,
        starts_at,
        ends_at,
        person_name: document.getElementById("person_name").value.trim() || null,
        person_type: document.getElementById("person_type").value,
        pre_brief: document.getElementById("pre_brief").value.trim() || null,
        vc_platform: document.getElementById("vc_platform").value || null,
        vc_link: document.getElementById("vc_link").value.trim() || null,
        record_mode: document.getElementById("record_mode").value
      };

      const { error } = await supabase.from("appointments").insert(payload);
      if (error) { msg.textContent = "Error: " + error.message; return; }

      msg.textContent = "Evento creado ✅";
      document.getElementById("title").value = "";
      document.getElementById("person_name").value = "";
      document.getElementById("pre_brief").value = "";
      document.getElementById("vc_link").value = "";

      await loadList();
    });

    loadList();
  </script>
</body>
</html>
